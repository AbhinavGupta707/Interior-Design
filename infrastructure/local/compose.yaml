name: interior-design-local

services:
  postgres:
    image: kartoza/postgis:18.4-3.6.4--v2026.06.20
    environment:
      POSTGRES_DBNAME: ${LOCAL_POSTGRES_DB:-interior_design}
      POSTGRES_MULTIPLE_EXTENSIONS: postgis,postgis_topology
      POSTGRES_PASS: ${LOCAL_POSTGRES_PASSWORD:-local-development-only}
      POSTGRES_USER: ${LOCAL_POSTGRES_USER:-localdev}
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          PGPASSWORD="$${POSTGRES_PASS}" pg_isready
          --username "$${POSTGRES_USER}"
          --dbname "$${POSTGRES_DBNAME}"
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 45s
    ports:
      - name: postgres
        target: 5432
        published: "54321"
        host_ip: 127.0.0.1
        protocol: tcp
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - dependencies
    restart: unless-stopped

  object-storage:
    image: chrislusf/seaweedfs:4.29
    command:
      - mini
      - -dir=/data
    environment:
      AWS_ACCESS_KEY_ID: ${LOCAL_OBJECT_STORE_ACCESS_KEY:-localdev}
      AWS_SECRET_ACCESS_KEY: ${LOCAL_OBJECT_STORE_SECRET_KEY:-local-development-only}
      S3_BUCKET: source,derived,issued,quarantine
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:9333/cluster/status
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    ports:
      - name: s3
        target: 8333
        published: "8333"
        host_ip: 127.0.0.1
        protocol: tcp
      - name: seaweed-master
        target: 9333
        published: "9333"
        host_ip: 127.0.0.1
        protocol: tcp
    volumes:
      - object-storage-data:/data
    networks:
      - dependencies
    restart: unless-stopped

  temporal:
    image: temporalio/temporal:1.6.1
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --db-filename
      - /home/temporal/temporal.db
    healthcheck:
      test:
        - CMD
        - temporal
        - operator
        - cluster
        - health
        - --address
        - 127.0.0.1:7233
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    ports:
      - name: temporal-grpc
        target: 7233
        published: "7233"
        host_ip: 127.0.0.1
        protocol: tcp
      - name: temporal-ui
        target: 8233
        published: "8233"
        host_ip: 127.0.0.1
        protocol: tcp
    volumes:
      - temporal-data:/home/temporal
    networks:
      - dependencies
    restart: unless-stopped

networks:
  dependencies:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.host_binding_ipv4: 127.0.0.1

volumes:
  object-storage-data:
  postgres-data:
  temporal-data:
