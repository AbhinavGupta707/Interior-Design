name: HomeDesignCapture

options:
  bundleIdPrefix: com.homedesignstudio
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en-GB
  groupSortPosition: top
  indentWidth: 2
  tabWidth: 2
  xcodeVersion: "26.4"

configs:
  Debug: debug
  Release: release

settings:
  base:
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    CLANG_ENABLE_MODULES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete
    SWIFT_VERSION: "6.0"

targets:
  HomeDesignCapture:
    type: application
    platform: iOS
    sources:
      - path: HomeDesignCapture
        excludes:
          - Resources/Info.plist
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: RoomPlan.framework
    configFiles:
      Debug: Configurations/Debug.xcconfig
      Release: Configurations/Release.xcconfig
    info:
      path: HomeDesignCapture/Resources/Info.plist
      properties:
        CFBundleDisplayName: $(APP_DISPLAY_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        HomeDesignAPIBaseURL: $(API_BASE_URL)
        HomeDesignEnvironment: $(APP_ENVIRONMENT)
        NSCameraUsageDescription: Capture rights-cleared photos, silent video, and supported depth as immutable evidence for your selected home design project.
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.homedesignstudio.capture
        PRODUCT_NAME: HomeDesignCapture

  HomeDesignCaptureTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HomeDesignCaptureTests
    dependencies:
      - target: HomeDesignCapture
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.homedesignstudio.capture.tests

  HomeDesignCaptureUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HomeDesignCaptureUITests
    dependencies:
      - target: HomeDesignCapture
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.homedesignstudio.capture.ui-tests
        TEST_TARGET_NAME: HomeDesignCapture

schemes:
  HomeDesignCapture:
    build:
      targets:
        HomeDesignCapture: all
        HomeDesignCaptureTests:
          - test
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: HomeDesignCaptureTests
        - name: HomeDesignCaptureUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
